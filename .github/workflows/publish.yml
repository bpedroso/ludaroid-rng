name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_npmjs:
        description: 'Publicar também no npmjs.com (requer NPM_TOKEN)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          pnpm run typecheck
          pnpm test

      - run: pnpm run build

      - name: Set version from commit
        id: version
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA::7}"
          VERSION="${SHORT_SHA}"
          TAG="commit-${SHORT_SHA}"
          npm pkg set "version=${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        run: |
          mkdir -p dist-pack
          pnpm pack --pack-destination dist-pack

      - name: Resolve tarball path
        id: tarball
        run: |
          FILE=$(ls dist-pack/*.tgz)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: commit ${{ steps.version.outputs.short_sha }}
          body: |
            Publicado automaticamente após CI bem-sucedido no commit [`${{ github.event.workflow_run.head_sha || github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}).
            Versão do pacote: `${{ steps.version.outputs.version }}`
          files: ${{ steps.tarball.outputs.path }}
          generate_release_notes: true

      - name: Publish to GitHub Packages
        if: github.repository_owner == 'ludaroid'
        run: |
          echo "@ludaroid:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GitHub Packages skipped (scope @ludaroid)
        if: github.repository_owner != 'ludaroid'
        run: |
          echo "GitHub Packages não publicado: o scope @ludaroid exige a org GitHub 'ludaroid'."
          echo "O pacote está disponível na Release deste workflow (tarball, sem chave)."
          echo "Para usar o registry: crie a org ludaroid ou use o tarball da Release."

      - name: Publish to npmjs.com
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npmjs
        run: pnpm publish --no-git-checks --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
