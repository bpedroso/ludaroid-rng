name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_npmjs:
        description: 'Publicar também no npmjs.com (requer NPM_TOKEN)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

      - name: Pack tarball
        run: |
          mkdir -p dist-pack
          pnpm pack --pack-destination dist-pack

      - name: Resolve tarball path
        id: tarball
        run: |
          FILE=$(ls dist-pack/*.tgz)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.path }}
          generate_release_notes: true

      - name: Publish to GitHub Packages
        if: github.repository_owner == 'ludaroid'
        run: |
          echo "@ludaroid:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Note — GitHub Packages skipped
        if: github.repository_owner != 'ludaroid'
        run: |
          echo "GitHub Packages skipped: scope @ludaroid requires GitHub org 'ludaroid'."
          echo "Use o tarball da Release ou npmjs.com — ver README.md."

      - name: Publish to npmjs.com
        if: >-
          (startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_NPMJS == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_npmjs)
        run: pnpm publish --no-git-checks --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
