name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_npmjs:
        description: 'Publicar também no npmjs.com (requer NPM_TOKEN)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

      - name: Set version from commit
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="0.0.0-${SHORT_SHA}"
          TAG="commit-${SHORT_SHA}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        run: |
          mkdir -p dist-pack
          pnpm pack --pack-destination dist-pack

      - name: Resolve tarball path
        id: tarball
        run: |
          FILE=$(ls dist-pack/*.tgz)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: commit ${{ steps.version.outputs.short_sha }}
          body: |
            Publicado automaticamente a partir do commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).
            Versão do pacote: `${{ steps.version.outputs.version }}`
          files: ${{ steps.tarball.outputs.path }}
          generate_release_notes: true

      - name: Publish to GitHub Packages
        run: |
          echo "@ludaroid:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.com
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npmjs
        run: pnpm publish --no-git-checks --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
